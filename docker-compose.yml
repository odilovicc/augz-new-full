services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-augz}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-augz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: AUGZ
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-augz}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
    volumes:
      - back_storage:/var/www/storage
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./back/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./back/public:/var/www/public:ro
      - back_storage:/var/www/storage:ro
    depends_on:
      - back

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NUXT_PUBLIC_YANDEX_MAPS_API_KEY}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
        NUXT_PUBLIC_API_BASE: ${API_URL}/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${API_URL}/api

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${API_URL}/api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NUXT_PUBLIC_API_BASE: ${API_URL}/api

volumes:
  db_data:
  back_storage:
